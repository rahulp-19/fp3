<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pragya Mood Game</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(270deg, #ff6ec4, #7873f5, #42e695);
            background-size: 600% 600%;
            animation: bg 10s ease infinite;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        @keyframes bg {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1rem;
            margin-bottom: 10px;
        }

        button {
            width: 80%;
            max-width: 250px;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .start {
            background: #00ffcc;
            color: black;
        }

        .catch {
            background: #ff4d6d;
            color: white;
            position: fixed;
            width: 130px;
        }

        button:active {
            transform: scale(0.95);
        }

        #gameArea {
            display: none;
        }

        #score {
            font-size: 1.3rem;
            margin-top: 10px;
        }

        #aiText {
            margin-top: 15px;
            font-size: 1.1rem;
            display: none;
        }

        #final {
            display: none;
            font-size: 1.2rem;
            margin-top: 15px;
            color: #fff176;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🎮 Pragya Mood Game</h1>
        <p>Tap and prove you're not serious 😏</p>

        <button class="start" onclick="startGame()">Start</button>

        <div id="gameArea">
            <p>Catch the button 👇</p>
            <div id="score">Score: 0</div>
            <button class="catch" id="btn">Tap Me 😏</button>
        </div>

        <div id="aiText"></div>
        <div id="final"></div>

    </div>

    <script>
        let btn = document.getElementById("btn");
        let score = 0;

        function moveButton() {
            let padding = 20;

            let maxX = window.innerWidth - btn.offsetWidth - padding;
            let maxY = window.innerHeight - btn.offsetHeight - padding;

            let x = Math.random() * maxX;
            let y = Math.random() * maxY;

            btn.style.left = x + "px";
            btn.style.top = y + "px";
        }

        // Touch event (mobile)
        btn.addEventListener("touchstart", (e) => {
            e.preventDefault();

            score++;
            document.getElementById("score").innerText = "Score: " + score;

            if (navigator.vibrate) navigator.vibrate(40);

            if (score >= 5) {
                endGame();
            } else {
                moveButton();
            }
        });

        // Click fallback
        btn.addEventListener("click", () => {
            score++;
            document.getElementById("score").innerText = "Score: " + score;

            if (score >= 5) {
                endGame();
            } else {
                moveButton();
            }
        });

        function startGame() {
            document.querySelector(".start").style.display = "none";
            document.getElementById("gameArea").style.display = "block";
            moveButton();
        }

        function endGame() {
            document.getElementById("gameArea").style.display = "none";

            let ai = document.getElementById("aiText");
            ai.style.display = "block";

            let steps = [
                "🤖 Scanning Pragya...",
                "Analyzing seriousness...",
                "Checking hidden fun level...",
                "Almost done..."
            ];

            let i = 0;

            let interval = setInterval(() => {
                ai.innerText = steps[i];
                i++;

                if (i === steps.length) {
                    clearInterval(interval);

                    setTimeout(() => {
                        document.getElementById("final").style.display = "block";
                        document.getElementById("final").innerHTML = `
                RESULT 💖<br><br>
                You tried 😏<br>
                So you're NOT that serious 😌<br><br>
                Secret unlocked 🔓<br>
                <b>You’re actually fun... just hiding it 😄</b><br><br>
                Now smile a little 😊
                `;
                    }, 800);
                }
            }, 900);
        }
    </script>

</body>

</html>
